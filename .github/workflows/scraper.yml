name: Weekly Shrinkflation Scraper

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

# --- Permissions fix for Exit code 128 ---
permissions:
  contents: write
# -----------------------------------------

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      # Step A: Checkout repository (updated to v4)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step B: Set up Python (updated to v5)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step C: Install dependencies
      - name: Install dependencies
        run: |
          pip install requests pandas beautifulsoup4

      # Step D: Run scraper
      - name: Run Scraper Script
        run: python script.py

      # Step E: Commit and push changes
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated data update" || echo "No changes to commit"
          git pull --rebase origin main
          git push
