name: Weekly Shrinkflation Scraper

# 1. The Trigger: When should this run?
on:
  schedule:
    # This runs at 3:00 AM every Sunday
    - cron: '0 3 * * 0'
  workflow_dispatch: # This allows you to click a button to run it manually

# 2. The Job: What should the cloud computer do?
jobs:
  scrape-data:
    runs-on: ubuntu-latest # Gives you a free Linux server

    steps:
      # Step A: Get your code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step B: Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step C: Install the libraries your script needs
      - name: Install dependencies
        run: |
          pip install requests pandas beautifulsoup4

      # Step D: Run your scraper
      - name: Run Scraper Script
        run: python script.py

      # Step E: Save the new data back to your repository
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated data update" || echo "No changes to commit"
          git push
