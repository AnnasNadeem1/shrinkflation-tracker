name: Weekly Shrinkflation Scraper
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scraper-workflow
  cancel-in-progress: false

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4

      - name: Run Scraper Script
        run: python script.py

      - name: Commit and push with retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Automated data update"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && echo "Push succeeded" && exit 0
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          echo "All push attempts failed" && exit 1
